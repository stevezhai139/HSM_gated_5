# ═══════════════════════════════════════════════════════════════════════════════
# postgresql_docker.conf
# PostgreSQL configuration for 8 GB RAM Docker container
# HSM: Memory-constrained experiment environment
#
# Goal: force disk I/O at SF=10 so index advisor shows genuine benefit.
# All values tuned for 8 GB total container memory.
# ═══════════════════════════════════════════════════════════════════════════════

# ── Connections ───────────────────────────────────────────────────────────────
listen_addresses = '*'
max_connections = 20           # experiment only needs 1-2 connections at a time

# ── Memory ────────────────────────────────────────────────────────────────────
shared_buffers       = 2GB     # 25% of 8 GB — PostgreSQL buffer pool
work_mem             = 128MB   # per sort/hash (reduced from 256 MB — less RAM)
maintenance_work_mem = 512MB   # for CREATE INDEX operations
temp_buffers         = 32MB

# Tell the planner how much OS page cache is available.
# 8 GB total - 2 GB shared_buffers - ~1 GB OS = ~5 GB for page cache.
effective_cache_size = 5GB

# ── Planner ──────────────────────────────────────────────────────────────────
random_page_cost     = 2.0     # disk-bound: higher than native SSD (1.1)
                               # encourages index use when data is not cached
seq_page_cost        = 1.0
cpu_tuple_cost       = 0.01
cpu_index_tuple_cost = 0.005
cpu_operator_cost    = 0.0025

# ── WAL / Checkpoints ────────────────────────────────────────────────────────
wal_level            = replica   # minimal requires max_wal_senders=0; use replica instead
max_wal_senders      = 0         # disable replication slots (not needed for experiments)
max_wal_size         = 2GB
min_wal_size         = 256MB
checkpoint_completion_target = 0.9

# ── Background writer ────────────────────────────────────────────────────────
bgwriter_lru_maxpages   = 100
bgwriter_delay          = 200ms

# ── Parallelism ───────────────────────────────────────────────────────────────
# Disable parallelism for reproducibility — parallel workers share work_mem
# and can mask performance differences between conditions.
max_parallel_workers_per_gather = 0
max_parallel_workers            = 0
max_parallel_maintenance_workers = 0

# ── Logging (minimal — avoid I/O from log writes) ────────────────────────────
logging_collector      = off
log_min_messages       = warning
log_min_error_statement = error

# ── Autovacuum ────────────────────────────────────────────────────────────────
autovacuum             = on
autovacuum_max_workers = 1     # limit background I/O during experiments
