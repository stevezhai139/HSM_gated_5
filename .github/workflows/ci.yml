name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Metric-axiom unit tests (Lemma 1)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run metric-property tests
        run: pytest -q code/tests/test_metric_properties.py

  smoke-kernel-ablation:
    name: CPU smoke (B2 kernel ablation)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: B2 kernel ablation (angular / cosine / euclidean)
        run: python code/experiments/overnight/b2_kernel_ablation.py

      - name: Upload ablation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-ablation-${{ github.sha }}
          path: results/overnight_*/b2_kernel_ablation/
          if-no-files-found: warn
          retention-days: 14

  smoke-inphase:
    name: CPU smoke (B4 in-phase perturbation)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: B4 amplitude-invariance check
        run: python code/experiments/overnight/b4_inphase_perturbation.py

      - name: Upload in-phase artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inphase-${{ github.sha }}
          path: results/overnight_*/b4_inphase/
          if-no-files-found: warn
          retention-days: 14
